name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-check:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        check:
          - name: unit-test
            command: ./mvnw -B test
          - name: static-analysis
            command: ./mvnw -B checkstyle:check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.command }}